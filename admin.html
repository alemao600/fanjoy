<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Fanjoy Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
    }

    .admin-header {
      background: linear-gradient(135deg, #ff6bce, #7c3aed);
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .admin-header h1 {
      font-size: 24px;
      font-weight: 800;
    }

    .admin-header .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff6bce, #7c3aed);
      color: white;
      box-shadow: 0 4px 12px rgba(255, 107, 206, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255, 107, 206, 0.4);
    }

    .btn-secondary {
      background: white;
      color: #1a1a2e;
      border: 1px solid #e5e7eb;
    }

    .btn-secondary:hover {
      background: #f9fafb;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-logout {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .btn-logout:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      border-bottom: 2px solid #e5e7eb;
    }

    .tab {
      padding: 12px 24px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      font-size: 15px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .tab.active {
      color: #ff6bce;
      border-bottom-color: #ff6bce;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .section-header h2 {
      font-size: 24px;
      font-weight: 700;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .product-admin-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .product-admin-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .product-admin-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .product-admin-card-body {
      padding: 16px;
    }

    .product-admin-card h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .product-admin-card p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .product-admin-card .price {
      font-size: 20px;
      font-weight: 700;
      color: #ff6bce;
      margin-bottom: 12px;
    }

    .product-admin-card .tag {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(255, 107, 206, 0.1);
      color: #ff6bce;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .product-admin-card .actions {
      display: flex;
      gap: 8px;
    }

    .product-admin-card .btn {
      flex: 1;
      padding: 8px;
      font-size: 13px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      padding: 20px;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 32px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-header h2 {
      font-size: 24px;
      font-weight: 700;
    }

    .btn-close {
      background: none;
      border: none;
      font-size: 28px;
      color: #6b7280;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .btn-close:hover {
      background: #f3f4f6;
      color: #1a1a2e;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #ff6bce;
      box-shadow: 0 0 0 4px rgba(255, 107, 206, 0.1);
    }

    .image-preview {
      margin-top: 12px;
      border-radius: 8px;
      overflow: hidden;
      max-width: 100%;
    }

    .image-preview img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .images-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .image-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid #e5e7eb;
      transition: all 0.3s ease;
    }

    .image-item:hover {
      border-color: #ff6bce;
      transform: scale(1.05);
    }

    .image-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .image-item .remove-image {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .image-item .remove-image:hover {
      background: #dc2626;
      transform: scale(1.1);
    }

    .add-image-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 120px;
      border: 2px dashed #e5e7eb;
      border-radius: 8px;
      background: #f9fafb;
      color: #6b7280;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .add-image-btn:hover {
      border-color: #ff6bce;
      background: rgba(255, 107, 206, 0.05);
      color: #ff6bce;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .form-actions .btn {
      flex: 1;
    }

    .categories-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .category-badge:hover {
      border-color: #ff6bce;
      background: rgba(255, 107, 206, 0.05);
    }

    .category-checkbox {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
    }

    .category-checkbox:hover {
      border-color: #ff6bce;
      background: rgba(255, 107, 206, 0.05);
    }

    .category-checkbox input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #ff6bce;
    }

    .category-checkbox.checked {
      border-color: #ff6bce;
      background: rgba(255, 107, 206, 0.1);
      font-weight: 600;
    }

    .category-checkbox {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
    }

    .category-checkbox:hover {
      border-color: #ff6bce;
      background: rgba(255, 107, 206, 0.05);
    }

    .category-checkbox input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #ff6bce;
    }

    .category-checkbox.checked {
      border-color: #ff6bce;
      background: rgba(255, 107, 206, 0.1);
      font-weight: 600;
    }

    .product-categories-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .product-categories-tags span {
      padding: 4px 10px;
      background: linear-gradient(135deg, #ff6bce, #7c3aed);
      color: white;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .category-badge button {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .stat-card .label {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6bce, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 20px;
      margin-bottom: 8px;
      color: #1a1a2e;
    }
  </style>
</head>
<body>
  <div class="admin-header">
    <h1>🛠️ Painel Administrativo - Fanjoy Lab</h1>
    <div class="user-info">
      <span>Olá, <strong id="adminUser">Admin</strong></span>
      <button class="btn btn-logout" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="admin-container">
    <div class="stats">
      <div class="stat-card">
        <div class="label">Total de Produtos</div>
        <div class="value" id="totalProducts">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Categorias</div>
        <div class="value" id="totalCategories">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Último Update</div>
        <div class="value" style="font-size: 16px; color: #6b7280;" id="lastUpdate">-</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('products')">Produtos</button>
      <button class="tab" onclick="switchTab('categories')">Categorias</button>
    </div>

    <!-- Products Tab -->
    <div id="productsTab" class="tab-content active">
      <div class="section-header">
        <h2>Gerenciar Produtos</h2>
        <button class="btn btn-primary" onclick="openProductModal()">+ Adicionar Produto</button>
      </div>
      <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Categories Tab -->
    <div id="categoriesTab" class="tab-content">
      <div class="section-header">
        <h2>Gerenciar Categorias</h2>
        <button class="btn btn-primary" onclick="openCategoryModal()">+ Adicionar Categoria</button>
      </div>
      <div class="categories-list" id="categoriesList"></div>
    </div>
  </div>

  <!-- Product Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="productModalTitle">Adicionar Produto</h2>
        <button class="btn-close" onclick="closeProductModal()">&times;</button>
      </div>
      <form id="productForm" onsubmit="saveProduct(event)">
        <input type="hidden" id="productId">
        
        <div class="form-group">
          <label for="productName">Nome do Produto *</label>
          <input type="text" id="productName" required>
        </div>

        <div class="form-group">
          <label for="productDescription">Descrição *</label>
          <textarea id="productDescription" required></textarea>
        </div>

        <div class="form-group">
          <label for="productPrice">Preço (R$) *</label>
          <input type="number" id="productPrice" step="0.01" min="0" required>
        </div>

        <div class="form-group">
          <label>Categorias * (selecione pelo menos uma)</label>
          <div id="productCategories" style="display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px;">
            <!-- Checkboxes serão inseridos aqui -->
          </div>
        </div>

        <div class="form-group">
          <label for="productTag">Tag</label>
          <input type="text" id="productTag" placeholder="Ex: Novo, Hot, Exclusivo">
        </div>

        <div class="form-group">
          <label for="productButtonText">Texto do Botão</label>
          <input type="text" id="productButtonText" placeholder="Ex: Comprar, Personalizar">
        </div>

        <div class="form-group">
          <label>Imagens do Produto *</label>
          <div class="images-gallery" id="imagesGallery">
            <div class="add-image-btn" onclick="document.getElementById('productImageFile').click()">
              + Adicionar Imagem
            </div>
          </div>
          <input type="text" id="productImageUrl" placeholder="Ou cole a URL da imagem" style="margin-top: 12px;">
          <button type="button" class="btn btn-secondary" onclick="addImageFromUrl()" style="margin-top: 8px; width: 100%;">Adicionar URL</button>
          <input type="file" id="productImageFile" accept="image/*" multiple style="display: none;" onchange="handleImageUpload(event)">
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeProductModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Category Modal -->
  <div id="categoryModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Adicionar Categoria</h2>
        <button class="btn-close" onclick="closeCategoryModal()">&times;</button>
      </div>
      <form id="categoryForm" onsubmit="saveCategory(event)">
        <div class="form-group">
          <label for="categoryName">Nome da Categoria *</label>
          <input type="text" id="categoryName" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeCategoryModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Adicionar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Check authentication
    if (sessionStorage.getItem('fanjoy_admin_logged') !== 'true') {
      window.location.href = 'login.html';
    }

    // Set user name
    document.getElementById('adminUser').textContent = sessionStorage.getItem('fanjoy_admin_user') || 'Admin';

    // Initialize
    let products = [];
    let categories = [];
    let editingProductId = null;
    let currentProductImages = [];

    // Load data
    function loadData() {
      products = JSON.parse(localStorage.getItem('fanjoy_products')) || getDefaultProducts();
      categories = JSON.parse(localStorage.getItem('fanjoy_categories')) || getDefaultCategories();
      
      renderProducts();
      renderCategories();
      updateStats();
      updateCategorySelect();
    }

    function getDefaultProducts() {
      return [
        {
          id: Date.now(),
          name: 'Camiseta Oversize',
          description: 'Algodão premium 280g, print neon high quality',
          price: 149,
          images: ['https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&w=600&q=80'],
          image: 'https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&w=600&q=80',
          tag: 'Novo',
          buttonText: 'Comprar',
          category: 'Camiseta'
        },
        {
          id: Date.now() + 1,
          name: 'Caneca Holográfica',
          description: 'Acabamento holo, interior colorido + brinde',
          price: 69,
          images: ['https://images.unsplash.com/photo-1523365280197-f21d6cfc1c67?auto=format&fit=crop&w=600&q=80'],
          image: 'https://images.unsplash.com/photo-1523365280197-f21d6cfc1c67?auto=format&fit=crop&w=600&q=80',
          tag: 'Hot',
          buttonText: 'Comprar',
          category: 'Caneca'
        },
        {
          id: Date.now() + 2,
          name: 'Photocard Set',
          description: 'Papel 400g, laminação premium + QR code',
          price: 79,
          images: ['https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=600&q=80'],
          image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=600&q=80',
          tag: 'Exclusivo',
          buttonText: 'Comprar',
          category: 'Photocard'
        },
        {
          id: Date.now() + 3,
          name: 'Moletom Stage',
          description: 'Oversized, patches refletivos, termocrômico',
          price: 249,
          images: ['https://images.unsplash.com/photo-1542293787938-4d273c3608b8?auto=format&fit=crop&w=600&q=80'],
          image: 'https://images.unsplash.com/photo-1542293787938-4d273c3608b8?auto=format&fit=crop&w=600&q=80',
          tag: 'Trending',
          buttonText: 'Comprar',
          category: 'Moletom'
        },
        {
          id: Date.now() + 4,
          name: 'Lightstick Custom',
          description: 'Base acrílica, LED RGB, bateria recarregável',
          price: 289,
          images: ['https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=600&q=80'],
          image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=600&q=80',
          tag: 'Limited',
          buttonText: 'Comprar',
          category: 'Acessório'
        },
        {
          id: Date.now() + 5,
          name: 'Camiseta Personalizada',
          description: 'Escolha grupo, cor e nome. Print UV resistente',
          price: 179,
          images: ['https://images.unsplash.com/photo-1503602642458-232111445657?auto=format&fit=crop&w=600&q=80'],
          image: 'https://images.unsplash.com/photo-1503602642458-232111445657?auto=format&fit=crop&w=600&q=80',
          tag: 'Customiza',
          buttonText: 'Personalizar',
          category: 'Camiseta'
        }
      ];
    }

    function getDefaultCategories() {
      return ['Camiseta', 'Caneca', 'Photocard', 'Moletom', 'Acessório'];
    }

    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      
      if (products.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <div class="empty-state-icon">📦</div>
            <h3>Nenhum produto cadastrado</h3>
            <p>Comece adicionando seu primeiro produto</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = products.map(product => `
        <div class="product-admin-card">
          <img src="${product.images ? product.images[0] : product.image}" alt="${product.name}">
          <div class="product-admin-card-body">
            <div class="tag">${product.tag || 'Produto'}</div>
            ${product.images && product.images.length > 1 ? `<p style="font-size: 11px; color: #6b7280;">📸 ${product.images.length} fotos</p>` : ''}
            <h3>${product.name}</h3>
            <p>${product.description}</p>
            <div class="price">R$ ${product.price}</div>
            <p style="font-size: 12px; margin-top: 8px;"><strong>Categorias:</strong> ${(product.categories || [product.category]).join(', ')}</p>
            <div class="actions">
              <button class="btn btn-secondary" onclick="editProduct(${product.id})">Editar</button>
              <button class="btn btn-danger" onclick="deleteProduct(${product.id})">Excluir</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderCategories() {
      const list = document.getElementById('categoriesList');
      
      if (categories.length === 0) {
        list.innerHTML = `
          <div class="empty-state" style="width: 100%;">
            <div class="empty-state-icon">🏷️</div>
            <h3>Nenhuma categoria cadastrada</h3>
            <p>Adicione categorias para organizar seus produtos</p>
          </div>
        `;
        return;
      }

      list.innerHTML = categories.map(category => `
        <div class="category-badge">
          ${category}
          <button onclick="deleteCategory('${category}')" title="Remover categoria">&times;</button>
        </div>
      `).join('');
    }

    function updateStats() {
      document.getElementById('totalProducts').textContent = products.length;
      document.getElementById('totalCategories').textContent = categories.length;
      
      const lastUpdate = localStorage.getItem('fanjoy_last_update');
      if (lastUpdate) {
        const date = new Date(lastUpdate);
        document.getElementById('lastUpdate').textContent = date.toLocaleString('pt-BR');
      }
    }

    function updateCategorySelect() {
      const container = document.getElementById('productCategories');
      if (!container) return;
      
      container.innerHTML = categories.map(cat => `
        <label class="category-checkbox">
          <input type="checkbox" value="${cat}" onchange="updateCategoryCheckboxes()">
          <span>${cat}</span>
        </label>
      `).join('');
    }

    function updateCategoryCheckboxes() {
      document.querySelectorAll('.category-checkbox').forEach(label => {
        const checkbox = label.querySelector('input[type="checkbox"]');
        if (checkbox.checked) {
          label.classList.add('checked');
        } else {
          label.classList.remove('checked');
        }
      });
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      if (tab === 'products') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('productsTab').classList.add('active');
      } else {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('categoriesTab').classList.add('active');
      }
    }

    function openProductModal(productId = null) {
      editingProductId = productId;
      currentProductImages = [];
      const modal = document.getElementById('productModal');
      const form = document.getElementById('productForm');
      form.reset();
      document.getElementById('productImageUrl').value = '';
      
      updateCategorySelect();
      
      if (productId) {
        const product = products.find(p => p.id === productId);
        if (product) {
          document.getElementById('productModalTitle').textContent = 'Editar Produto';
          document.getElementById('productId').value = product.id;
          document.getElementById('productName').value = product.name;
          document.getElementById('productDescription').value = product.description;
          document.getElementById('productPrice').value = product.price;
          document.getElementById('productTag').value = product.tag || '';
          document.getElementById('productButtonText').value = product.buttonText || '';
          
          // Marcar categorias selecionadas
          const productCategories = product.categories || [product.category];
          setTimeout(() => {
            document.querySelectorAll('#productCategories input[type="checkbox"]').forEach(checkbox => {
              if (productCategories.includes(checkbox.value)) {
                checkbox.checked = true;
              }
            });
            updateCategoryCheckboxes();
          }, 50);
          
          // Load existing images
          if (product.images && product.images.length > 0) {
            currentProductImages = [...product.images];
          } else if (product.image) {
            currentProductImages = [product.image];
          }
        }
      } else {
        document.getElementById('productModalTitle').textContent = 'Adicionar Produto';
      }
      
      renderImagesGallery();
      modal.classList.add('active');
    }

    function renderImagesGallery() {
      const gallery = document.getElementById('imagesGallery');
      
      gallery.innerHTML = currentProductImages.map((img, index) => `
        <div class="image-item">
          <img src="${img}" alt="Imagem ${index + 1}">
          <button type="button" class="remove-image" onclick="removeImage(${index})">&times;</button>
        </div>
      `).join('') + `
        <div class="add-image-btn" onclick="document.getElementById('productImageFile').click()">
          + Adicionar
        </div>
      `;
    }

    function handleImageUpload(event) {
      const files = event.target.files;
      
      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
          currentProductImages.push(e.target.result);
          renderImagesGallery();
        };
        reader.readAsDataURL(file);
      });
      
      // Clear input
      event.target.value = '';
    }

    function addImageFromUrl() {
      const url = document.getElementById('productImageUrl').value.trim();
      if (url) {
        currentProductImages.push(url);
        renderImagesGallery();
        document.getElementById('productImageUrl').value = '';
      }
    }

    function removeImage(index) {
      currentProductImages.splice(index, 1);
      renderImagesGallery();
    }

    function closeProductModal() {
      document.getElementById('productModal').classList.remove('active');
      editingProductId = null;
    }

    function saveProduct(e) {
      e.preventDefault();
      
      if (currentProductImages.length === 0) {
        alert('Adicione pelo menos uma imagem ao produto!');
        return;
      }
      
      // Pegar categorias selecionadas
      const selectedCategories = [];
      document.querySelectorAll('#productCategories input[type="checkbox"]:checked').forEach(checkbox => {
        selectedCategories.push(checkbox.value);
      });
      
      if (selectedCategories.length === 0) {
        alert('Selecione pelo menos uma categoria!');
        return;
      }
      
      const product = {
        id: editingProductId || Date.now(),
        name: document.getElementById('productName').value,
        description: document.getElementById('productDescription').value,
        price: parseFloat(document.getElementById('productPrice').value),
        categories: selectedCategories,
        category: selectedCategories[0], // Backward compatibility
        tag: document.getElementById('productTag').value || 'Novo',
        buttonText: document.getElementById('productButtonText').value || 'Comprar',
        images: [...currentProductImages],
        image: currentProductImages[0] // Backward compatibility
      };

      if (editingProductId) {
        const index = products.findIndex(p => p.id === editingProductId);
        products[index] = product;
      } else {
        products.push(product);
      }

      saveData();
      closeProductModal();
      renderProducts();
      updateStats();
    }

    function editProduct(id) {
      openProductModal(id);
    }

    function deleteProduct(id) {
      if (confirm('Tem certeza que deseja excluir este produto?')) {
        products = products.filter(p => p.id !== id);
        saveData();
        renderProducts();
        updateStats();
      }
    }

    function openCategoryModal() {
      document.getElementById('categoryModal').classList.add('active');
    }

    function closeCategoryModal() {
      document.getElementById('categoryModal').classList.remove('active');
      document.getElementById('categoryForm').reset();
    }

    function saveCategory(e) {
      e.preventDefault();
      const categoryName = document.getElementById('categoryName').value;
      
      if (!categories.includes(categoryName)) {
        categories.push(categoryName);
        saveData();
        renderCategories();
        updateStats();
        updateCategorySelect();
        closeCategoryModal();
      } else {
        alert('Esta categoria já existe!');
      }
    }

    function deleteCategory(categoryName) {
      if (confirm(`Tem certeza que deseja excluir a categoria "${categoryName}"?`)) {
        categories = categories.filter(c => c !== categoryName);
        saveData();
        renderCategories();
        updateStats();
        updateCategorySelect();
      }
    }

    function saveData() {
      localStorage.setItem('fanjoy_products', JSON.stringify(products));
      localStorage.setItem('fanjoy_categories', JSON.stringify(categories));
      localStorage.setItem('fanjoy_last_update', new Date().toISOString());
    }

    function logout() {
      sessionStorage.removeItem('fanjoy_admin_logged');
      sessionStorage.removeItem('fanjoy_admin_user');
      window.location.href = 'login.html';
    }

    // Image preview handlers
    document.getElementById('productImageUrl').addEventListener('input', (e) => {
      const url = e.target.value;
      if (url) {
        document.getElementById('imagePreview').style.display = 'block';
        document.getElementById('previewImg').src = url;
      }
    });

    document.getElementById('productImageFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const imageUrl = event.target.result;
          document.getElementById('productImageUrl').value = imageUrl;
          document.getElementById('imagePreview').style.display = 'block';
          document.getElementById('previewImg').src = imageUrl;
        };
        reader.readAsDataURL(file);
      }
    });

    // Close modals on outside click
    document.getElementById('productModal').addEventListener('click', (e) => {
      if (e.target.id === 'productModal') closeProductModal();
    });

    document.getElementById('categoryModal').addEventListener('click', (e) => {
      if (e.target.id === 'categoryModal') closeCategoryModal();
    });

    // Initialize on load
    loadData();
  </script>
</body>
</html>
