<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho - Fanjoy Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #ff6bce;
      --accent2: #7c3aed;
      --accent3: #22d2ff;
      --text: #1a1a2e;
      --muted: #6b7280;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f9fa;
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      padding: 20px 40px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      text-decoration: none;
      color: white;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
      align-items: start;
    }

    .cart-items {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .cart-item {
      display: flex;
      gap: 16px;
      padding: 20px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item-image {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 12px;
      background: #f3f4f6;
      flex-shrink: 0;
    }

    .cart-item-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cart-item-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .cart-item-price {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
    }

    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .quantity-control {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f3f4f6;
      border-radius: 8px;
      padding: 4px;
    }

    .quantity-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: white;
      border-radius: 6px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quantity-btn:hover {
      background: var(--accent);
      color: white;
    }

    .quantity-value {
      width: 40px;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
    }

    .btn-remove {
      padding: 8px 16px;
      border: none;
      background: rgba(239, 68, 68, 0.1);
      color: #dc2626;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 13px;
    }

    .btn-remove:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .cart-summary {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 24px;
    }

    .summary-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .summary-row.total {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 2px solid #f3f4f6;
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
    }

    .btn-checkout {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
      box-shadow: 0 10px 30px rgba(255, 107, 206, 0.4);
    }

    .btn-checkout:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(255, 107, 206, 0.5);
    }

    .btn-continue {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--accent);
      border-radius: 10px;
      background: white;
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 12px;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .btn-continue:hover {
      background: rgba(255, 107, 206, 0.05);
    }

    .empty-cart {
      text-align: center;
      padding: 80px 20px;
      background: white;
      border-radius: 16px;
    }

    .empty-cart-icon {
      font-size: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-cart h2 {
      font-size: 24px;
      margin-bottom: 12px;
      color: var(--text);
    }

    .empty-cart p {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .empty-cart a {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border-radius: 12px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .empty-cart a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 107, 206, 0.4);
    }

    @media (max-width: 968px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }

      .cart-summary {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .cart-item {
        flex-direction: column;
      }

      .cart-item-controls {
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <a href="index.html" class="logo">🛍️ Fanjoy Lab</a>
    </div>
  </header>

  <div class="container">
    <h1 class="page-title">🛒 Seu Carrinho</h1>

    <div id="cartContent">
      <!-- Cart will be rendered here -->
    </div>
  </div>

  <script>
    // cart é gerenciado por cart-integration.js
    
    function renderCart() {
      const container = document.getElementById('cartContent');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <div class="empty-cart-icon">🛒</div>
            <h2>Seu carrinho está vazio</h2>
            <p>Adicione produtos incríveis da nossa loja!</p>
            <a href="index.html">Continuar Comprando</a>
          </div>
        `;
        return;
      }

      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const shipping = subtotal > 200 ? 0 : 25;
      const total = subtotal + shipping;

      container.innerHTML = `
        <div class="cart-layout">
          <div class="cart-items">
            ${cart.map(item => `
              <div class="cart-item">
                <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                <div class="cart-item-info">
                  <div class="cart-item-name">${item.name}</div>
                  <div class="cart-item-price">R$ ${item.price.toFixed(2)}</div>
                  <div class="cart-item-controls">
                    <div class="quantity-control">
                      <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                      <div class="quantity-value">${item.quantity}</div>
                      <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                    </div>
                    <button class="btn-remove" onclick="removeItem(${item.id})">Remover</button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>

          <div class="cart-summary">
            <div class="summary-title">Resumo do Pedido</div>
            <div class="summary-row">
              <span>Subtotal (${cart.length} ${cart.length === 1 ? 'item' : 'itens'})</span>
              <span>R$ ${subtotal.toFixed(2)}</span>
            </div>
            <div class="summary-row">
              <span>Frete</span>
              <span>${shipping === 0 ? 'GRÁTIS' : 'R$ ' + shipping.toFixed(2)}</span>
            </div>
            ${subtotal < 200 ? `
              <div style="font-size: 12px; color: #16a34a; margin-top: 8px; padding: 8px; background: rgba(34, 197, 94, 0.1); border-radius: 6px;">
                💚 Faltam R$ ${(200 - subtotal).toFixed(2)} para frete grátis!
              </div>
            ` : ''}
            <div class="summary-row total">
              <span>Total</span>
              <span>R$ ${total.toFixed(2)}</span>
            </div>
            <button class="btn-checkout" onclick="checkout()">Finalizar Compra</button>
            <a href="index.html" class="btn-continue">Continuar Comprando</a>
          </div>
        </div>
      `;
    }

    function updateQuantity(productId, change) {
      const item = cart.find(i => i.id === productId);
      if (item) {
        item.quantity += change;
        if (item.quantity <= 0) {
          removeItem(productId);
        } else {
          saveCart();
          renderCart();
        }
      }
    }

    function removeItem(productId) {
      if (confirm('Deseja remover este item do carrinho?')) {
        cart = cart.filter(i => i.id !== productId);
        saveCart();
        renderCart();
      }
    }

    function saveCart() {
      localStorage.setItem('fanjoy_cart', JSON.stringify(cart));
    }

    function checkout() {
      // Check if customer is logged in
      const isLogged = sessionStorage.getItem('fanjoy_customer_logged') === 'true';
      
      if (!isLogged) {
        if (confirm('Você precisa estar logado para finalizar a compra. Deseja fazer login agora?')) {
          // Save intended redirect
          sessionStorage.setItem('fanjoy_checkout_redirect', 'true');
          window.location.href = 'customer-login.html';
        }
        return;
      }

      // Get customer data
      const customerId = parseInt(sessionStorage.getItem('fanjoy_customer_id'));
      const customers = JSON.parse(localStorage.getItem('fanjoy_customers')) || [];
      const customer = customers.find(c => c.id === customerId);

      if (!customer) {
        alert('Erro ao carregar dados do cliente');
        return;
      }

      // Check if customer has addresses
      if (!customer.addresses || customer.addresses.length === 0) {
        if (confirm('Você precisa cadastrar um endereço antes de finalizar a compra. Deseja ir para seu perfil agora?')) {
          window.location.href = 'customer-profile.html';
        }
        return;
      }

      // Create order
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const shipping = subtotal > 200 ? 0 : 25;
      const total = subtotal + shipping;

      const order = {
        id: Date.now(),
        date: new Date().toISOString(),
        items: cart.map(item => ({
          id: item.id,
          name: item.name,
          price: item.price,
          quantity: item.quantity,
          image: item.image
        })),
        subtotal: subtotal,
        shipping: shipping,
        total: total,
        status: 'pending',
        address: customer.addresses[0] // Use first address
      };

      // Add order to customer
      if (!customer.orders) {
        customer.orders = [];
      }
      customer.orders.push(order);

      // Update customer in localStorage
      const customerIndex = customers.findIndex(c => c.id === customerId);
      customers[customerIndex] = customer;
      localStorage.setItem('fanjoy_customers', JSON.stringify(customers));

      // Clear cart
      cart = [];
      saveCart();

      // Show success message and redirect
      alert('🎉 Pedido realizado com sucesso!\n\nPedido #' + order.id + '\n\nAcompanhe seu pedido no seu perfil.');
      window.location.href = 'customer-profile.html';
    }

    // Check for checkout redirect
    if (sessionStorage.getItem('fanjoy_checkout_redirect') === 'true') {
      sessionStorage.removeItem('fanjoy_checkout_redirect');
      // User just logged in and should proceed to checkout
      if (cart.length > 0) {
        setTimeout(() => {
          if (confirm('Deseja finalizar sua compra agora?')) {
            checkout();
          }
        }, 500);
      }
    }

    // Initialize
    renderCart();
  </script>

  <!-- Mercado Pago SDK -->
  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <!-- API Integration -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cart-integration.js"></script>
</body>
</html>
