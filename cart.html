<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Fanjoy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --accent:#ff6bce; --accent2:#7c3aed; --text:#111827; --muted:#6b7280; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,sans-serif;background:#f5f6fa;color:var(--text)}
    header{padding:18px 24px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
    .wrap{max-width:1200px;margin:0 auto;padding:24px 16px}
    .title{font-size:34px;font-weight:800;margin-bottom:18px}
    .layout{display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start}
    .card{background:#fff;border-radius:14px;border:1px solid #eceff5;box-shadow:0 8px 22px rgba(0,0,0,.06)}
    #cartItems{padding:14px}
    .item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f0f2f8}
    .item:last-child{border-bottom:0}
    .item img{width:88px;height:88px;border-radius:10px;object-fit:cover;background:#f2f3f6}
    .item h4{font-size:16px;margin-bottom:6px}
    .item p{color:#6b7280;font-size:13px}
    .qty{display:flex;align-items:center;gap:8px;margin-top:8px}
    .qty button{border:0;background:#eceff7;border-radius:8px;width:30px;height:30px;cursor:pointer;font-weight:800}
    .remove{margin-top:8px;border:0;background:#fee2e2;color:#b91c1c;border-radius:8px;padding:6px 10px;cursor:pointer;font-weight:700}
    .summary{padding:16px;position:sticky;top:12px}
    .summary h3{font-size:20px;margin-bottom:10px}
    .ship-box{margin-top:10px;padding:10px;border:1px solid #eceff5;border-radius:10px;background:#fafbff}
    .ship-box label{display:block;font-size:12px;color:#6b7280;font-weight:700;margin-bottom:6px}
    .ship-row{display:flex;gap:8px}
    .ship-row input{flex:1;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font-weight:600}
    .ship-row button{border:0;border-radius:10px;background:#111827;color:#fff;padding:10px 12px;cursor:pointer;font-weight:700}
    .ship-status{font-size:12px;color:#6b7280;margin-top:8px;min-height:16px}
    .row{display:flex;justify-content:space-between;margin:8px 0;font-size:14px}
    .total{font-size:24px;font-weight:800;color:var(--accent2);margin-top:8px}
    .btn{width:100%;border:0;border-radius:12px;padding:13px 14px;font-weight:800;cursor:pointer}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;margin-top:12px}
    .btn-secondary{background:#f3f4f6;color:#111827;margin-top:8px}
    .empty{text-align:center;padding:60px 20px;color:var(--muted)}
    @media (max-width:980px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header><div class="wrap" style="padding:0;"><strong style="font-size:22px;">Fanjoy Checkout</strong></div></header>
  <main class="wrap">
    <h1 class="title">Seu Carrinho</h1>
    <div class="layout">
      <section class="card"><div id="cartItems"></div></section>
      <aside class="card summary" id="cartSummary">
        <h3>Resumo do Pedido</h3>
        <div class="ship-box">
          <label for="shippingCep">Calcular frete por CEP</label>
          <div class="ship-row">
            <input id="shippingCep" type="text" placeholder="00000-000" maxlength="9">
            <button type="button" onclick="calculateShipping()">Calcular</button>
          </div>
          <div id="shippingStatus" class="ship-status"></div>
        </div>
        <div class="row"><span>Subtotal</span><strong id="subtotalValue">R$ 0,00</strong></div>
        <div class="row"><span>Frete</span><strong id="shippingValue">R$ 0,00</strong></div>
        <div class="row total"><span>Total</span><span id="totalValue">R$ 0,00</span></div>
        <button class="btn btn-primary" onclick="checkout()">Pagar com Mercado Pago</button>
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">Continuar Comprando</button>
      </aside>
    </div>
  </main>

  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cart-integration.js"></script>
</body>
</html>
