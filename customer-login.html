<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Fanjoy Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #ff6bce 0%, #7c3aed 50%, #22d2ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .top-brand{
      position:fixed;
      top:16px;
      left:18px;
      z-index:2;
      display:inline-flex;
      align-items:center;
      gap:10px;
      color:#fff;
      text-decoration:none;
      font-weight:800;
      font-size:20px;
    }
    .top-brand img{width:34px;height:34px;border-radius:50%;object-fit:cover}
    .top-cart{
      position:fixed;
      top:16px;
      right:18px;
      z-index:2;
      color:#1a1a2e;
      background:rgba(255,255,255,.92);
      border:1px solid rgba(255,255,255,.45);
      border-radius:12px;
      padding:10px 16px;
      text-decoration:none;
      font-weight:800;
      box-shadow:0 12px 30px rgba(0,0,0,.12);
    }
    .top-cart span{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:20px;
      height:20px;
      margin-left:6px;
      padding:0 6px;
      border-radius:999px;
      background:#ff6bce;
      color:#fff;
      font-size:12px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
      animation: bgPulse 15s ease-in-out infinite;
    }

    @keyframes bgPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .auth-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 1;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .auth-header h1 {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 8px;
      background: linear-gradient(135deg, #ff6bce, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-header p {
      color: #6b7280;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 12px;
      padding: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      background: white;
      color: #ff6bce;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.8);
    }

    .form-group input:focus {
      outline: none;
      border-color: #ff6bce;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(255, 107, 206, 0.1);
    }

    .message {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      border: 1px solid;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      color: #dc2626;
      border-color: rgba(239, 68, 68, 0.2);
    }

    .message.success {
      background: rgba(34, 197, 94, 0.1);
      color: #16a34a;
      border-color: rgba(34, 197, 94, 0.2);
    }

    .message.show {
      display: block;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #ff6bce, #7c3aed);
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(255, 107, 206, 0.4);
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(255, 107, 206, 0.5);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: #6b7280;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s ease;
    }

    .back-link a:hover {
      color: #ff6bce;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: #6b7280;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .divider span {
      padding: 0 10px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 640px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .auth-container {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <a class="top-brand" href="index.html">
    <img src="logo.png" alt="Fanjoy">
    <span>Fanjoy</span>
  </a>
  <a class="top-cart" href="cart.html">Carrinho <span id="loginCartCount" hidden>0</span></a>
  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-logo">Fanjoy</div>
      <h1>Bem-vindo!</h1>
      <p>Entre ou crie sua conta na Fanjoy Lab</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchAuthTab('login', this)">Entrar</button>
      <button class="tab-btn" onclick="switchAuthTab('register', this)">Cadastrar</button>
    </div>

    <!-- Login Form -->
    <div id="loginTab" class="tab-content active">
      <div class="message error" id="loginError"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">E-mail</label>
          <input type="email" id="loginEmail" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="loginPassword">Senha</label>
          <input type="password" id="loginPassword" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-submit">Entrar</button>
      </form>
    </div>

    <!-- Register Form -->
    <div id="registerTab" class="tab-content">
      <div class="message error" id="registerError"></div>
      <div class="message success" id="registerSuccess"></div>
      
      <form id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label for="registerName">Nome</label>
            <input type="text" id="registerName" required>
          </div>

          <div class="form-group">
            <label for="registerLastName">Sobrenome</label>
            <input type="text" id="registerLastName" required>
          </div>
        </div>

        <div class="form-group">
          <label for="registerEmail">E-mail</label>
          <input type="email" id="registerEmail" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="registerPhone">Telefone</label>
          <input type="tel" id="registerPhone" placeholder="(00) 00000-0000" required>
        </div>

        <div class="form-group">
          <label for="registerPassword">Senha</label>
          <input type="password" id="registerPassword" minlength="6" required autocomplete="new-password">
        </div>

        <div class="form-group">
          <label for="registerPasswordConfirm">Confirmar Senha</label>
          <input type="password" id="registerConfirmPassword" minlength="6" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn-submit">Criar Conta</button>
      </form>
    </div>

    <div class="back-link">
      <a href="index.html">Voltar para a loja</a>
    </div>
  </div>

  <script>
    function switchAuthTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach((item) => item.classList.remove('active'));
      if (btn) btn.classList.add('active');

      document.querySelectorAll('.tab-content').forEach((content) => content.classList.remove('active'));
      if (tab === 'login') {
        document.getElementById('loginTab').classList.add('active');
      } else {
        document.getElementById('registerTab').classList.add('active');
      }

      document.querySelectorAll('.message').forEach((msg) => msg.classList.remove('show'));
    }
  </script>

  <!-- API Integration -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/login-integration.js"></script>
</body>
</html>
